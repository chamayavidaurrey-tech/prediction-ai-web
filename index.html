<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ AI Pronósticos 24/7 - LIVE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen p-4 md:p-8 text-white font-sans">
    <div class="max-w-6xl mx-auto space-y-6">

        <!-- HEADER LIVE -->
        <div class="bg-white/5 backdrop-blur-xl rounded-3xl p-6 border border-white/20 shadow-2xl">
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-gradient-to-r from-emerald-500 to-green-600 rounded-2xl flex items-center justify-center animate-pulse">
                        <i class="fas fa-robot text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl md:text-4xl font-black bg-gradient-to-r from-white to-gray-200 bg-clip-text text-transparent">
                            AI PRONÓSTICOS LIVE
                        </h1>
                        <div class="flex items-center gap-6 text-sm opacity-90 mt-1">
                            <span id="matchCount">12</span> partidos hoy
                            <span id="aiStatus">🟢 IA activa 24/7</span>
                            <span id="lastUpdate" class="ml-auto"></span>
                        </div>
                    </div>
                </div>
                <!-- NUEVO BOTÓN GENERAR PRONÓSTICOS -->
                <button onclick="generatePredictions()" class="px-8 py-3 bg-gradient-to-r from-orange-500 to-yellow-600 hover:from-orange-600 hover:to-yellow-700 rounded-2xl font-bold shadow-xl hover:scale-105">
                    <i class="fas fa-magic"></i> Generar Pronósticos
                </button>
            </div>
        </div>

        <!-- COMBINADA 5+ -->
        <div class="bg-white/5 backdrop-blur-xl rounded-3xl p-8 border border-white/20 shadow-2xl">
            <h2 class="text-3xl font-black mb-8 flex items-center gap-3 text-yellow-400">
                <i class="fas fa-coins"></i> Combinada Total: <span id="totalOdds" class="text-4xl">5.42</span>
            </h2>
            <div id="comboMatches" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- PARTIDOS CARGAN AQUÍ -->
            </div>
        </div>

    </div>

    <script>
        // Simulación de generar predicciones
        function generatePredictions() {
            console.log('🔮 Generando predicciones...');
            alert('Pronósticos generados exitosamente. Recargue la página para visualizarlos.');
        }
    </script>
</body>
</html>
