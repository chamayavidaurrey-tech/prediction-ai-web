<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ AI Pronósticos 24/7 - Hoy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-indigo-900 to-purple-900 min-h-screen p-6">
    <div class="max-w-6xl mx-auto">
        <!-- STATUS 24/7 -->
        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-6 mb-8 border border-white/20">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-green-500/20 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-robot text-green-400 text-xl"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl font-bold text-white">🤖 IA 24/7 Activa</h2>
                        <div class="flex gap-4 text-sm text-white/80">
                            <span id="matchesToday">0</span> partidos hoy | 
                            <span id="searchStatus">Buscando...</span> | 
                            <span id="lastUpdate">--:--</span>
                        </div>
                    </div>
                </div>
                <button id="refreshBtn" class="px-6 py-2 bg-white/20 hover:bg-white/30 rounded-2xl transition-all">
                    <i class="fas fa-sync-alt mr-2"></i>Actualizar
                </button>
            </div>
        </div>

        <!-- TABS -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <!-- COMBINADA 5+ -->
            <div id="comboTab" class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
                <h3 class="text-2xl font-bold mb-6 flex items-center gap-3 text-yellow-400">
                    <i class="fas fa-trophy"></i>Combinada 5.00+
                </h3>
                <div id="comboPreds" class="space-y-4 mb-8">
                    <!-- Pronósticos cargan aquí -->
                </div>
                <div class="text-center p-6 bg-gradient-to-r from-yellow-500/20 to-orange-500/20 rounded-2xl">
                    <div class="text-4xl font-black text-yellow-400 mb-2" id="totalCuota">5.23</div>
                    <button class="w-full bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-600 hover:to-emerald-700 px-8 py-4 rounded-2xl font-bold text-xl">
                        <i class="fas fa-play mr-2"></i>Apostar Combinada
                    </button>
                </div>
            </div>

            <!-- 3 PARTIDOS +2.5 BTTS -->
            <div id="highTab" class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20 hidden lg:block">
                <h3 class="text-2xl font-bold mb-6 flex items-center gap-3 text-red-400">
                    <i class="fas fa-fire"></i>Top 3 +2.5 & BTTS
                </h3>
                <div id="highPreds" class="space-y-4">
                    <!-- 3 partidos top -->
                </div>
            </div>
        </div>

        <!-- LIVE UPDATES -->
        <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-6 border border-white/20">
            <div class="flex justify-between items-center">
                <span class="text-white/80">
                    <i class="fas fa-clock text-blue-400 mr-2"></i>
                    Última búsqueda: <span id="liveTime">--</span>
                </span>
                <div class="w-3 h-3 bg-green-400 rounded-full animate-ping"></div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        
        // Conexión real-time
        socket.on('connect', () => {
            console.log('✅ Conectado a IA 24/7');
            document.getElementById('searchStatus').textContent = 'Conectado';
        });
        
        // Recibe datos del servidor
        socket.on('predictions', (data) => {
            updateUI(data);
            document.getElementById('lastUpdate').textContent = new Date().toLocaleTimeString();
        });
        
        socket.on('live-scan', (data) => {
            document.getElementById('matchesToday').textContent = data.matches;
            document.getElementById('searchStatus').textContent = data.status;
            document.getElementById('liveTime').textContent = new Date().toLocaleTimeString();
        });
        
        // Refresh manual
        document.getElementById('refreshBtn').onclick = () => {
            socket.emit('refresh');
        };
        
        function updateUI(data) {
            // Combinada 5+
            const comboHTML = data.combo.map(p => `
                <div class="p-4 bg-white/20 rounded-2xl border border-white/30 hover:scale-105 transition-all">
                    <div class="flex justify-between items-start mb-2">
                        <div>
                            <div class="font-bold text-white">${p.match}</div>
                            <div class="text-xs text-white/70">${p.date} ${p.time}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-xl font-black text-yellow-400">${p.odds}</div>
                            <span class="text-xs bg-green-500/30 text-green-300 px-2 py-1 rounded-full">${p.confidence}%</span>
                        </div>
                    </div>
                    <div class="text-xs text-white/80">${p.pick}</div>
                </div>
            `).join('');
            
            document.getElementById('comboPreds').innerHTML = comboHTML;
            document.getElementById('totalCuota').textContent = data.totalOdds;
            document.getElementById('comboTab').classList.remove('hidden');
            
            // Top 3
            const highHTML = data.high3.map(p => `
                <div class="p-4 bg-gradient-to-r from-red-500/20 to-orange-500/20 rounded-2xl border-2 border-red-400/30 text-center">
                    <div class="font-bold text-xl text-white mb-2">${p.match}</div>
                    <div class="text-2xl font-black text-red-400 mb-3">${p.comboOdds}x</div>
                    <div class="text-sm text-white/90">${p.over25}% + ${p.btts}% BTTS</div>
                </div>
            `).join('');
            
            document.getElementById('highPreds').innerHTML = highHTML;
        }
        
        // Carga inicial
        setTimeout(() => socket.emit('get-predictions'), 1000);
    </script>
</body>
</html>
