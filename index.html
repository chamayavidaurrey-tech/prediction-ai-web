<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚽ LIVE Pronósticos 24/7 - Flashscore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>body{background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);font-family:system-ui}</style>
</head>
<body class="min-h-screen p-4 md:p-8 text-white">
    <div class="max-w-7xl mx-auto">
        <!-- LIVE STATUS -->
        <div class="bg-gradient-to-r from-emerald-500/20 to-green-500/20 backdrop-blur-xl rounded-3xl p-6 mb-8 border-2 border-emerald-400/40">
            <div class="flex flex-wrap gap-4 items-center justify-between">
                <div class="flex items-center gap-4">
                    <div class="w-16 h-16 bg-emerald-500/30 rounded-2xl flex items-center justify-center animate-pulse">
                        <i class="fas fa-broadcast-tower text-emerald-400 text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-3xl font-black">⚽ LIVE 24/7 - Flashscore</h1>
                        <div class="flex flex-wrap gap-4 text-lg mt-1">
                            <span id="liveMatches">0</span> partidos hoy |
                            <span id="statusLive">Conectando...</span> |
                            <span id="updateTime">-</span>
                        </div>
                    </div>
                </div>
                <button id="refreshLive" class="px-8 py-3 bg-white/20 hover:bg-white/30 rounded-2xl font-bold flex items-center gap-2 transition-all">
                    <i class="fas fa-sync-alt animate-spin"></i> LIVE UPDATE
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8">
            <!-- COMBINADA -->
            <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
                <h2 class="text-3xl font-black mb-8 flex items-center gap-3 text-yellow-400">
                    <i class="fas fa-coins"></i> Combinada <span class="text-4xl" id="cuota">5.23</span>x
                </h2>
                <div id="comboList" class="space-y-4 mb-12 min-h-96"></div>
                <div class="p-8 bg-gradient-to-r from-yellow-500/30 to-orange-500/30 rounded-3xl border-4 border-yellow-400/50 text-center">
                    <h3 class="text-2xl font-bold mb-6">🎯 APUESTA SEGURA IA</h3>
                    <button class="w-full bg-gradient-to-r from-emerald-500 to-green-600 text-white font-black py-5 px-12 rounded-2xl text-xl shadow-2xl hover:scale-105 transition-all">
                        <i class="fas fa-rocket mr-3"></i> APOSTAR COMBINADA
                    </button>
                </div>
            </div>

            <!-- TOP 3 + CASAS -->
            <div class="space-y-8">
                <!-- TOP 3 -->
                <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
                    <h2 class="text-3xl font-black mb-8 flex items-center gap-3 text-red-400">
                        <i class="fas fa-fire"></i> 🔥 TOP 3 +2.5 & BTTS
                    </h2>
                    <div id="top3List" class="space-y-4 min-h-80"></div>
                </div>

                <!-- CASAS DE APUESTAS -->
                <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
                    <h2 class="text-2xl font-bold mb-6 flex items-center gap-3 text-blue-400">
                        <i class="fas fa-building-columns"></i> 🏆 Casas de Apuestas
                    </h2>
                    <div id="bettingHouses" class="grid grid-cols-2 gap-4"></div>
                </div>
            </div>
        </div>

        <!-- FLASHSCORE LIVE -->
        <div class="mt-12 bg-gradient-to-r from-blue-500/20 to-indigo-500/20 backdrop-blur-xl rounded-3xl p-8 border-2 border-blue-400/40">
            <h2 class="text-3xl font-black mb-8 flex items-center gap-3 text-blue-400">
                <i class="fas fa-list"></i> 📺 Flashscore LIVE
            </h2>
            <div id="flashscoreLive" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </div>
    </div>

    <script>
        const socket = io();
        
        socket.on('connect', () => {
            document.getElementById('statusLive').textContent = '🟢 LIVE 24/7';
            console.log('✅ Conectado Flashscore LIVE');
        });
        
        socket.on('live-data', (data) => {
            updateAll(data);
        });
        
        document.getElementById('refreshLive').onclick = () => {
            socket.emit('refresh');
        };
        
        function updateAll(data) {
            // Cuota total
            document.getElementById('cuota').textContent = data.totalOdds;
            document.getElementById('liveMatches').textContent = data.matchesToday;
            document.getElementById('updateTime').textContent = data.lastUpdate;
            
            // Combinada
            document.getElementById('comboList').innerHTML = data.combo.map(p => `
                <div class="p-6 bg-white/20 hover:bg-white/30 rounded-2xl border border-white/40 hover:scale-[1.02] transition-all group">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <div class="font-bold text-xl">${p.match}</div>
                            <div class="flex gap-2 text-sm opacity-80 mt-1">
                                <span>${p.date} ${p.time}</span>
                                <span class="px-2 py-1 bg-blue-500/30 text-blue-300 rounded-full text-xs">${p.league}</span>
                                ${p.status === 'LIVE' ? `<span class="px-2 py-1 bg-red-500/30 text-red-300 rounded-full text-xs animate-pulse">LIVE</span>` : ''}
                            </div>
                            ${p.score ? `<div class="text-lg font-bold text-green-400 mt-1">${p.score}</div>` : ''}
                        </div>
                        <div class="text-right">
                            <div class="text-3xl font-black text-yellow-400">${p.odds}x</div>
                            <div class="text-sm bg-green-500/40 text-green-300 px-3 py-1 rounded-full mt-2">${p.confidence}%</div>
                        </div>
                    </div>
                    <div class="text-center py-2 bg-black/20 rounded-xl">
                        <span class="text-sm">${p.pick}</span>
                    </div>
                </div>
            `).join('');
            
            // Top 3
            document.getElementById('top3List').innerHTML = data.top3.map(p => `
                <div class="p-6 bg-gradient-to-br from-red-500/30 to-orange-500/30 rounded-2xl border-2 border-red-400/40 text-center hover:scale-105 transition-all">
                    <div class="font-bold text-xl mb-3">${p.match}</div>
                    <div class="text-4xl font-black bg-black/30 px-4 py-2 rounded-xl text-red-400 mb-4">${p.comboOdds}x</div>
                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>+2.5: <span class="text-green-400 font-bold">${p.over25}%</span></div>
                        <div>BTTS: <span class="text-blue-400 font-bold">${p.btts}%</span></div>
                    </div>
                </div>
            `).join('');
            
            // Casas apuestas
            document.getElementById('bettingHouses').innerHTML = data.casasApuestas.map(casa => `
                <div class="p-4 bg-white/20 rounded-xl hover:bg-white/30 transition-all border border-white/40">
                    <div class="font-bold text-sm mb-2">${casa.name}</div>
                    <div class="text-2xl font-black text-green-400 mb-2">${casa.combo}x</div>
                    <div class="text-xs opacity-80">+2.5: ${casa.over25} | BTTS: ${casa.btts}</div>
                </div>
            `).join('');
            
            // Flashscore LIVE
            document.getElementById('flashscoreLive').innerHTML = data.flashscoreLive.map(m => `
                <div class="p-4 bg-white/20 rounded-xl hover:bg-white/30 transition-all group border border-white/40">
                    <div class="font-bold">${m.home} <span class="text-green-400 font-black">${m.score}</span> ${m.away}</div>
                    <div class="text-xs opacity-75">${m.league} • ${m.time}</div>
                    ${m.status === 'LIVE' ? '<div class="text-red-400 text-xs font-bold mt-1 animate-pulse">● LIVE</div>' : ''}
                </div>
            `).join('');
        }
        
        // Auto refresh cada 30s
        setInterval(() => socket.emit('refresh'), 30000);
        socket.emit('init');
    </script>
</body>
</html>
